<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Homepage</title>
  <meta name="description" content="A simple personal homepage placeholder.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="hero">
      <nav class="topbar" aria-label="Primary">
        <span class="brand">VA</span>
        <div class="nav-line" aria-hidden="true"></div>
      </nav>

      <div class="hero-copy">
        <p class="eyebrow">Personal Homepage</p>
        <h1>Reserved for future content.</h1>
        <p class="summary">
          This page is live and ready. You can fill in your profile, projects, notes, or contact
          details later.
        </p>
      </div>
    </header>

    <main class="content-grid">
      <section class="panel panel-large" aria-label="Introduction placeholder">
        <div class="panel-label">01</div>
        <div class="panel-body"></div>
      </section>

      <section class="panel" aria-label="Projects placeholder">
        <div class="panel-label">02</div>
        <div class="panel-body"></div>
      </section>

      <section class="panel" aria-label="Writing placeholder">
        <div class="panel-label">03</div>
        <div class="panel-body"></div>
      </section>

      <section class="panel panel-wide" aria-label="Contact placeholder">
        <div class="panel-label">04</div>
        <div class="panel-body"></div>
      </section>
    </main>
  </div>
</body>
</html>
